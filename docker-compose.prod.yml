version: '3.8'

# 生产环境配置
services:
  postgres:
    image: postgres:16-alpine
    container_name: patent-postgres-prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: patent_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: patent-redis-prod
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: patent-backend-prod
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/patent_db
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY_HOURS: 24
      SERVER_PORT: 3000
      FILE_STORAGE_PATH: /app/uploads
      MAX_UPLOAD_SIZE_MB: 50
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      RUST_LOG: info
    volumes:
      - file_storage:/app/uploads
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: patent-frontend-prod
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 256M
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
    driver: local
  file_storage:
    driver: local
