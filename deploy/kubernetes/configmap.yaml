apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: patent-assist
data:
  DATABASE_HOST: "postgres"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "patent_db"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  JWT_EXPIRY_HOURS: "24"
  SERVER_PORT: "3000"
  FILE_STORAGE_PATH: "/app/uploads"
  MAX_UPLOAD_SIZE_MB: "50"
  RUST_LOG: "info"
